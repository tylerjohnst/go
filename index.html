<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Server</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .links {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links.show { display: flex; }
    a {
      display: block;
      padding: 0.75rem 1.5rem;
      background: #2d2d44;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s;
    }
    a:hover { background: #3d3d5c; }
    a.success { background: #27ae60; }
    a.failed {
      background: #444;
      color: #888;
      pointer-events: none;
    }
    .label {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Content Server</h1>
    <div class="spinner" id="spinner"></div>
    <p class="status" id="status">Detecting network...</p>
    <div class="links" id="links">
      <div>
        <a id="link-internal" href="https://mini.i.grimmston.com">Internal Network</a>
        <div class="label">192.168.x.x</div>
      </div>
      <div>
        <a id="link-vpn" href="https://mini.v.grimmston.com">Tailscale VPN</a>
        <div class="label">100.x.x.x</div>
      </div>
    </div>
  </div>
  <script>
    const endpoints = [
      { id: 'internal', url: 'https://mini.i.grimmston.com', name: 'Internal' },
      { id: 'vpn', url: 'https://mini.v.grimmston.com', name: 'VPN' }
    ];

    async function checkEndpoint(endpoint) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3000);

      try {
        // Use a simple fetch to the root - if it succeeds, we can connect
        await fetch(endpoint.url, {
          method: 'HEAD',
          mode: 'no-cors',
          signal: controller.signal
        });
        clearTimeout(timeout);
        return { ...endpoint, reachable: true };
      } catch {
        clearTimeout(timeout);
        return { ...endpoint, reachable: false };
      }
    }

    async function detectNetwork() {
      const status = document.getElementById('status');
      const spinner = document.getElementById('spinner');
      const links = document.getElementById('links');

      // Check all endpoints in parallel
      status.textContent = 'Checking connectivity...';
      const results = await Promise.all(endpoints.map(checkEndpoint));

      // Find first reachable endpoint
      const reachable = results.find(r => r.reachable);

      if (reachable) {
        status.textContent = `Found ${reachable.name} network. Redirecting...`;
        setTimeout(() => window.location.href = reachable.url, 500);
        return;
      }

      // No automatic detection worked - show manual links
      spinner.style.display = 'none';
      status.textContent = 'Could not auto-detect. Select manually:';
      links.classList.add('show');

      // Mark endpoints based on reachability
      results.forEach(r => {
        const link = document.getElementById(`link-${r.id}`);
        if (r.reachable) {
          link.classList.add('success');
        }
      });
    }

    detectNetwork();
  </script>
</body>
</html>
